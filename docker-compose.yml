services:
  mysql:
    image: mysql:latest
    container_name: bank_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "02HLxr7qT0p6BtA"
      MYSQL_DATABASE: bank_database
      MYSQL_USER: admin
      MYSQL_PASSWORD: "admin123"
    ports:
      - "3306:3306"
    volumes:
      - bank_db_data:/var/lib/mysql

volumes:
  bank_db_data: